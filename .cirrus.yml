container:
  image: ghcr.io/cirruslabs/android-sdk:35
  cpu: 8
  memory: 32G

task:
  setup_script:
  - sudo apt update
  - sudo apt install openjdk-17-jdk -y

  git_clone_script:
  # - git clone https://github.com/Automattic/pocket-casts-android
  - git clone https://github.com/thunderbird/thunderbird-android

  android_build_script:
  # - cd pocket-casts-android
  - cd thunderbird-android
  # - ./gradlew --no-daemon assembleDebug --stacktrace
  - ./gradlew build --stacktrace
  - ./gradlew check
